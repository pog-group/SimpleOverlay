<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello World!</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .video {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hidden {
        display: none;
      }

      .show-body-background-color {
        background-color: rgba(0, 0, 0, 0.5);
        border: 2px solid yellow;
      }

      
      .main {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .box {
        width: 400px;
        background-color: gray;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <video id="overlay2" class="hidden"></video>
    <div id="overlay1" class="hidden"></div>


    <div class="main">
      <div class="box">
        <h1>Select an URL to render</h1>
        <input id="url" type="text">
        <button id="render_1">Render</button>
        <h1>Or use premade URLs</h1>
        <select id="premadeUrls">
            <option value="none">-- Select URL --</option>
          <option value="http://localhost:4200/overlay?groupCode=a">http://localhost:4200/overlay?groupCode=a</option>
        </select>
        <button id="render_2">Render</button>
      </div>
    </div>

    <script>
        /***************************/
        /*        OVERLAY1        */
        /***************************/



        window.addEventListener('DOMContentLoaded', async () => {
                
            window.electron.toggleMouseEvent(true)
            document.body.classList.add('show-body-background-color')

            document.querySelector('#render_1').onclick = () => {

                const url = document.querySelector('#url').value

                // Check if url is valid
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    alert('Please enter a valid URL')
                    return;
                }
                window.electron.toggleMouseEvent(false)
                document.body.classList.remove('show-body-background-color')
                setTimeout(() => {
                    document.location.href = url
                }, 100)
            }

            document.querySelector('#render_2').onclick = () => {
                const url = document.querySelector('#premadeUrls').value
                // Check if url is valid
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    alert('Invalid URL')
                    return;
                }
                window.electron.toggleMouseEvent(false)
                document.body.classList.remove('show-body-background-color')
                setTimeout(() => {
                    document.location.href = url
                }, 100)
            }
        })

        function _overlay1() {
            document.location.href = "http://127.0.0.1:4000/ingame"
            window.electron.toggleMouseEvent(false)
        }

    </script>


    <script>
            
        /***************************/
        /*        OVERLAY2        */
        /***************************/


function _overlay2() {
        
    console.log('👋 This message is being logged by "renderer.js", included via webpack');

    let mediaRecorder;
    let recordedChunks = [];

    // Buttons
    const videoElement = document.querySelector('#overlay2');

    /*
    const startBtn = document.getElementById('startBtn');
    startBtn.onclick = e => {
    startRecording();
    startBtn.innerText = 'Recording';
    };

    const stopBtn = document.getElementById('stopBtn');

    stopBtn.onclick = e => {
    mediaRecorder.stop();
    startBtn.innerText = 'Start';
    };

    const videoSelectBtn = document.getElementById('videoSelectBtn');
    videoSelectBtn.onclick = getVideoSources;

    const selectMenu = document.getElementById('selectMenu') as any
    */


    const selectMenu = null;

    setTimeout(async () => {
        await getVideoSources()
        await startRecording()
    }, 100)

    async function getVideoSources() {
        const inputSources = await window.electron.getSources()
    
        inputSources.forEach((source) => {
        const element = document.createElement("option")
        element.value = source.id
        element.innerHTML = source.name
        selectMenu?.appendChild(element)
        });
    }


    async function startRecording() {
        let screenId = selectMenu ? selectMenu?.options[selectMenu?.selectedIndex].value : null
        screenId = "screen:1:0"
        

        console.log("screenId", screenId)


        const constraints = {
        audio: false,
        video: {
            mandatory: {
            chromeMediaSource: 'desktop',
            chromeMediaSourceId: screenId
            }
        }
        };
    
        // Create a Stream
        const stream = await navigator.mediaDevices
        .getUserMedia(constraints);
    
        // Preview the source in a video element
        videoElement.srcObject = stream;
        await videoElement.play();
    
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 2500000 });
        stream.getVideoTracks()[0].applyConstraints({ frameRate: 60 });
        mediaRecorder.ondataavailable = onDataAvailable;
        mediaRecorder.onstop = stopRecording;
        mediaRecorder.start();
    }

    function onDataAvailable(e) {
        recordedChunks.push(e.data);
    }


    async function stopRecording() {
        videoElement.srcObject = null

        const blob = new Blob(recordedChunks, {
        type: 'video/webm; codecs=vp9'
        });
    
        const buffer = Buffer.from(await blob.arrayBuffer());
        recordedChunks = []

        const { canceled, filePath } =  await ipcRenderer.invoke('showSaveDialog')
        if(canceled) return
    
        if (filePath) {
        //writeFile(filePath, buffer, () => console.log('video saved successfully!'));
        }
    }
}
    </script>
