<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160">

  <!-- Background -->
  <rect width="760" height="160" rx="18" fill="#0f172a"/>

  <g transform="translate(16, 0)">

  <!-- Icon mark: two offset windows -->
  <!-- Back window -->
  <rect x="22" y="26" width="94" height="64" rx="9" fill="none" stroke="#2e4a6e" stroke-width="5"/>
  <line x1="22" y1="46" x2="116" y2="46" stroke="#2e4a6e" stroke-width="4"/>

  <!-- Front window -->
  <rect x="42" y="46" width="94" height="64" rx="9" fill="#0f172a" stroke="#4a90d9" stroke-width="5"/>
  <line x1="42" y1="66" x2="136" y2="66" stroke="#4a90d9" stroke-width="4"/>

  <!-- Wordmark -->
  <text
    x="164" y="112"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    fill="#e2e8f0"
    font-weight="300"
    letter-spacing="-1"
  >Simple<tspan font-weight="600" fill="#4a90d9"> Overlay</tspan></text>

  </g>

</svg>
