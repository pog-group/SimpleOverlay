<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Back window (shadow layer) -->
  <rect x="90" y="130" width="300" height="220" rx="14" fill="none" stroke="#2563eb" stroke-width="6" opacity="0.35"/>

  <!-- Main window frame -->
  <rect x="70" y="110" width="300" height="220" rx="14" fill="url(#overlayGrad)" stroke="url(#frameGrad)" stroke-width="6"/>

  <!-- Title bar -->
  <rect x="70" y="110" width="300" height="36" rx="14" fill="#2563eb" opacity="0.85"/>
  <rect x="70" y="132" width="300" height="14" fill="#2563eb" opacity="0.85"/>

  <!-- Title bar dots -->
  <circle cx="100" cy="128" r="6" fill="#60a5fa" opacity="0.7"/>
  <circle cx="122" cy="128" r="6" fill="#60a5fa" opacity="0.45"/>
  <circle cx="144" cy="128" r="6" fill="#60a5fa" opacity="0.25"/>

  <!-- Globe / link icon inside window -->
  <!-- Globe circle -->
  <circle cx="220" cy="250" r="52" fill="none" stroke="#60a5fa" stroke-width="5" opacity="0.9"/>
  <!-- Globe horizontal lines -->
  <path d="M168 250 Q194 230 220 250 Q246 270 272 250" fill="none" stroke="#60a5fa" stroke-width="3.5" opacity="0.7"/>
  <path d="M168 250 Q194 270 220 250 Q246 230 272 250" fill="none" stroke="#60a5fa" stroke-width="3.5" opacity="0.7"/>
  <!-- Globe vertical line -->
  <line x1="220" y1="198" x2="220" y2="302" stroke="#60a5fa" stroke-width="3.5" opacity="0.7"/>

  <!-- Overlay indicator: second transparent layer on top-right -->
  <rect x="182" y="172" width="180" height="130" rx="10" fill="none" stroke="#7dd3fc" stroke-width="4" stroke-dasharray="10 6" opacity="0.55"/>

  <!-- "S O" text at bottom -->
  <text x="256" y="396" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#e0e0e0" text-anchor="middle" letter-spacing="8" opacity="0.92">OVERLAY</text>
</svg>
